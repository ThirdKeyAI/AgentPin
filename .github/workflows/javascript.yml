name: JavaScript CI
on:
  push:
    branches: [main]
    paths: ['javascript/**']
  pull_request:
    paths: ['javascript/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - working-directory: javascript
        run: |
          npm ci
          npm test
